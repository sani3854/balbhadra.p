<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balbhadra.p - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .content {
            color: #555;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #764ba2;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #653a8a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
        
        .features {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .feature-item {
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            color: #667eea;
            font-weight: 600;
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
        
        .github-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .github-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Balbhadra.p</h1>
        <p class="subtitle">Welcome to Your Project</p>
        
        <div class="content">
            <p>This is your new project repository. Start building something amazing today!</p>
        </div>
        
        <div class="button-group">
            <a href="https://github.com/sani3854/balbhadra.p" class="btn btn-primary">View on GitHub</a>
            <button class="btn btn-secondary" onclick="alert('Ready to customize!')">Get Started</button>
        </div>
        
        <div class="features">
            <h3 style="color: #333; margin-bottom: 15px;">Quick Features</h3>
            <div class="feature-grid">
                <div class="feature-item">📝 Clean Code</div>
                <div class="feature-item">🎨 Modern Design</div>
                <div class="feature-item">⚡ Fast & Responsive</div>
                <div class="feature-item">🔧 Easy Setup</div>
            </div>
        </div>
        
        <div class="footer">
            <p>Created with ❤️ by <a href="https://github.com/sani3854" class="github-link">sani3854</a></p>
            <p style="margin-top: 10px;">© 2026 All rights reserved.</p>
        </div>
    </div>
</body>
</html>
